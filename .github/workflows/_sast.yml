# =============================================================================
# Reusable Workflow: SAST (Semgrep)
# Static Application Security Testing — scan source code trước khi build
# Chạy song song với Gitleaks (Stage 0) — không cần image
# =============================================================================

name: "_sast"

on:
  workflow_call:
    inputs:
      severity_gate:
        description: "Severity tối thiểu để block pipeline (ERROR/WARNING)"
        required: false
        type: string
        default: "ERROR"
      config:
        description: "Semgrep ruleset (auto / p/owasp-top-ten / p/python)"
        required: false
        type: string
        default: "auto"
      run_triage:
        description: "Chạy LLM triage cho false positive (cần ANTHROPIC_API_KEY)"
        required: false
        type: boolean
        default: false
      target_repo:
        description: "Repo app cần scan (owner/name) — checkout vào ./target"
        required: false
        type: string
        default: ""
      target_ref:
        description: "Pin ref (commit SHA) của target"
        required: false
        type: string
        default: ""
    # Khai báo secret explicit → caller KHÔNG cần `secrets: inherit` (least privilege).
    # Chỉ đúng 1 secret _sast thực sự cần, không nhận toàn bộ secrets của repo.
    secrets:
      ANTHROPIC_API_KEY:
        description: "API key cho LLM false-positive triage (chỉ khi run_triage=true)"
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Semgrep full ruleset ~5-8 phút

    steps:
      # Checkout repo pipeline (rules/ custom + sample tests nằm ở đây)
      - name: Checkout pipeline (rules)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Checkout SOURCE của target app tại pin → SAST scan code sẽ ship (Day 6b)
      # Chỉ checkout khi caller truyền target_repo (optional để _sast tái dùng độc lập)
      - name: Checkout target app source
        if: inputs.target_repo != ''
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          path: target

      - name: Install Semgrep
        run: pip install semgrep

      # ---- SAST Quality Gate (ruleset cấu hình được) ----
      # --error: exit code 1 nếu có finding ở severity_gate → pipeline fail
      # --severity: chỉ report từ mức này trở lên
      # Trade-off: ERROR only = ít noise, chỉ block lỗi exploit được ngay.
      #   Nếu dùng WARNING → nhiều FP hơn, cần triage thường xuyên hơn.
      - name: "Semgrep SAST gate (${{ inputs.severity_gate }})"
        env:
          CONFIG: ${{ inputs.config }}
          SEVERITY: ${{ inputs.severity_gate }}
          SEMGREP_SEND_METRICS: "on"
        run: |
          # Scan cả repo pipeline VÀ target app (checkout tại ./target).
          # Exclude: rules/tests (sample TP có chủ đích) + _archive (bản vendored stale)
          semgrep --config "$CONFIG" \
                  --severity "$SEVERITY" \
                  --error \
                  --exclude "rules/tests" \
                  --exclude "_archive" \
                  .

      # ---- Custom Rules Gate (Day 20) ----
      # Chạy riêng rule tự viết để dễ debug khi fail
      # --exclude-dir rules/tests: bỏ qua test target file (chứa code TP có chủ đích)
      # Nếu không tìm thấy file rule → skip không lỗi (|| true)
      - name: "Semgrep custom rules gate (SQL injection)"
        env:
          SEMGREP_SEND_METRICS: "on"
        run: |
          if [ -f "rules/sqli-custom.yaml" ]; then
            echo "Running custom SQL injection rules..."
            semgrep --config rules/sqli-custom.yaml \
                    --severity ERROR \
                    --error \
                    --exclude "rules/tests" \
                    --exclude "_archive" \
                    . || {
              echo "::error::Custom SQL injection rule triggered — xem findings bên dưới"
              exit 1
            }
          else
            echo "No custom rules file found at rules/sqli-custom.yaml, skipping."
          fi

      # ---- SARIF Report (luôn chạy kể cả khi gate fail) ----
      # SARIF = Static Analysis Results Interchange Format
      # GitHub Security tab đọc được format này → hiện findings trong UI
      # Bao gồm cả custom rules để findings hiện trong Security tab với đúng rule ID
      - name: "Semgrep SARIF report (auto + custom rules)"
        if: always()
        env:
          SEMGREP_SEND_METRICS: "on"
        run: |
          CUSTOM_CONFIG=""
          if [ -f "rules/sqli-custom.yaml" ]; then
            CUSTOM_CONFIG="--config rules/sqli-custom.yaml"
          fi
          semgrep --config auto \
                  $CUSTOM_CONFIG \
                  --sarif \
                  --exclude "rules/tests" \
                  --exclude "_archive" \
                  -o semgrep-results.sarif \
                  . 2>/dev/null || true

      - name: Upload SARIF to GitHub Security tab
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8533807ff379ac610d2b2c389c47e7c629d31d13  # v4.36.3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-sast

      # ---- JSON artifact (audit trail 30 ngày + input cho triage script) ----
      - name: "Semgrep JSON report (auto + custom rules)"
        if: always()
        env:
          SEMGREP_SEND_METRICS: "on"
        run: |
          CUSTOM_CONFIG=""
          if [ -f "rules/sqli-custom.yaml" ]; then
            CUSTOM_CONFIG="--config rules/sqli-custom.yaml"
          fi
          semgrep --config auto \
                  $CUSTOM_CONFIG \
                  --json \
                  --exclude "rules/tests" \
                  --exclude "_archive" \
                  -o semgrep-report.json \
                  . 2>/dev/null || true

      # ---- LLM False Positive Triage (Day 20, tùy chọn) ----
      # Chỉ chạy khi run_triage=true VÀ có ANTHROPIC_API_KEY
      # Output: triage-report.md upload lên artifact
      # --dry-run nếu không có API key để không fail pipeline
      - name: "LLM False Positive Triage"
        if: always() && inputs.run_triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic --quiet
          if [ -f "semgrep-report.json" ]; then
            python scripts/triage_fp.py semgrep-report.json \
              --out triage-report.md \
              --model claude-haiku-4-5-20251001 || true
          else
            echo "semgrep-report.json not found, skipping triage"
          fi

      - name: Upload Semgrep reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: semgrep-reports
          path: |
            semgrep-results.sarif
            semgrep-report.json
            triage-report.md
          retention-days: 30
