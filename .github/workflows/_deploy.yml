# =============================================================================
# Reusable Workflow: DEPLOY
# Deploy to any environment via Docker Compose
# Supports: dev / staging / prod — caller chọn environment
# =============================================================================

name: "_deploy"

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name"
        required: true
        type: string
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string
      environment:
        description: "Target environment (dev / staging / production)"
        required: true
        type: string
      compose_file:
        description: "Path to docker-compose file"
        required: false
        type: string
        default: "docker-compose.yml"

    # Secrets phải explicitly pass qua workflow_call
    # Không tự inherit — đây là security feature của GitHub Actions
    secrets:
      NEWS_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      SUPABASE_URL:
        required: false
      SUPABASE_KEY:
        required: false
      # Phase 6: Discord là publisher hiện hành (thay Telegram legacy)
      DISCORD_WEBHOOK_URL:
        required: false
      REDDIT_CLIENT_ID:
        required: false
      REDDIT_CLIENT_SECRET:
        required: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # pull image + compose up; treo lâu hơn = mạng/registry lỗi

    # environment: link tới GitHub Environment settings
    # Cho phép:
    #   1. Protection rules (required reviewers, wait timer)
    #   2. Environment-specific secrets
    #   3. Deployment history tracking trong GitHub UI
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: docker pull "$IMAGE_NAME:$IMAGE_TAG"

      # Deploy: chạy container ở background (-d = detached)
      # AI Trend Agent là long-running service (loop vô tận, sleep 4h giữa các lần cào)
      # CI/CD chỉ có nhiệm vụ: build image → push → khởi động container → exit
      # Container tiếp tục chạy trên server sau khi job kết thúc
      - name: "Deploy to ${{ inputs.environment }}"
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          ENVIRONMENT: ${{ inputs.environment }}
          COMPOSE_FILE: ${{ inputs.compose_file }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          echo "=== Deploying to $ENVIRONMENT ==="
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"

          # -d: detached — khởi động container rồi job exit ngay
          # Container vẫn chạy liên tục trên server (long-running service)
          docker compose -f "$COMPOSE_FILE" up -d

          echo "=== Deploy completed — container running in background ==="

      # Verify: kiểm tra container đang Up sau khi start
      - name: Verify deployment
        if: success()
        env:
          COMPOSE_FILE: ${{ inputs.compose_file }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          sleep 5  # chờ container khởi động ổn định
          docker compose -f "$COMPOSE_FILE" ps
          # Fail nếu container không ở trạng thái running
          docker compose -f "$COMPOSE_FILE" ps | grep "ai-trend-agent" | grep -E "Up|running"
          echo "::notice::Deployment to $ENVIRONMENT completed — service is running"

      # Cleanup step này chỉ dọn nếu deploy fail
      # Nếu success: KHÔNG down container — nó cần tiếp tục chạy
      - name: Cleanup on failure
        if: failure()
        env:
          COMPOSE_FILE: ${{ inputs.compose_file }}
        run: |
          docker compose -f "$COMPOSE_FILE" down --timeout 30 || true

      # Rollback notification khi fail
      - name: Report failure
        if: failure()
        env:
          COMPOSE_FILE: ${{ inputs.compose_file }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          echo "::error::Deployment to $ENVIRONMENT FAILED"
          docker compose -f "$COMPOSE_FILE" logs --tail=50 || true
