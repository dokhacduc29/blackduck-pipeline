# =============================================================================
# Reusable Workflow: DEPLOY
# Deploy to any environment via Docker Compose
# Supports: dev / staging / prod — caller chọn environment
# =============================================================================

name: "_deploy"

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name"
        required: true
        type: string
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string
      environment:
        description: "Target environment (dev / staging / production)"
        required: true
        type: string
      compose_file:
        description: "Path to docker-compose file"
        required: false
        type: string
        default: "docker-compose.yml"

    # Secrets phải explicitly pass qua workflow_call
    # Không tự inherit — đây là security feature của GitHub Actions
    secrets:
      NEWS_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      SUPABASE_URL:
        required: false
      SUPABASE_KEY:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    # environment: link tới GitHub Environment settings
    # Cho phép:
    #   1. Protection rules (required reviewers, wait timer)
    #   2. Environment-specific secrets
    #   3. Deployment history tracking trong GitHub UI
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "${{ inputs.image_name }}:${{ inputs.image_tag }}"

      # Deploy: chạy container với secrets inject qua env vars
      # AI Trend Agent là BATCH JOB (chạy → scrape → save → exit)
      # Không phải web server → không dùng --wait/healthcheck
      # docker compose up --abort-on-container-exit: chờ container chạy xong,
      #   lấy exit code làm kết quả deploy
      - name: "Deploy to ${{ inputs.environment }}"
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "=== Deploying to ${{ inputs.environment }} ==="
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"

          # --abort-on-container-exit: dừng khi container exit
          # --exit-code-from agent: lấy exit code của service 'agent'
          # Exit 0 = pipeline chạy thành công, non-zero = có lỗi
          docker compose -f ${{ inputs.compose_file }} up \
            --abort-on-container-exit \
            --exit-code-from agent \
            --timeout 120

          echo "=== Deploy completed successfully ==="

      # Verify: kiểm tra container đã exit clean
      - name: Verify deployment
        if: success()
        run: |
          echo "::notice::Deployment to ${{ inputs.environment }} completed successfully"
          # Show container logs cho audit trail
          docker compose -f ${{ inputs.compose_file }} logs --tail=20 || true

      # Cleanup: dọn container sau khi chạy xong (batch job)
      - name: Cleanup
        if: always()
        run: |
          docker compose -f ${{ inputs.compose_file }} down --timeout 30 || true

      # Rollback notification khi fail
      - name: Report failure
        if: failure()
        run: |
          echo "::error::Deployment to ${{ inputs.environment }} FAILED"
          docker compose -f ${{ inputs.compose_file }} logs --tail=50 || true
