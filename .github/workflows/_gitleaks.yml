# =============================================================================
# Reusable Workflow: GITLEAKS — Secret Detection
# Chạy TRƯỚC build để fail-fast nếu có secret bị lộ
#
# Scan 2 lớp:
#   1. git history  → phát hiện secret đã commit vào bất kỳ commit nào
#   2. working tree → phát hiện secret trong file hiện tại (kể cả unstaged)
#
# Gọi bằng: uses: ./.github/workflows/_gitleaks.yml
# =============================================================================

name: "_gitleaks"

on:
  workflow_call:
    inputs:
      config_path:
        description: "Đường dẫn tới .gitleaks.toml"
        required: false
        type: string
        default: ".gitleaks.toml"
      fail_on_leak:
        description: "Fail pipeline nếu phát hiện secret (set false để chỉ report)"
        required: false
        type: boolean
        default: true
      target_repo:
        description: "Repo app cần scan secret (owner/name) — checkout vào ./target"
        required: false
        type: string
        default: ""
      target_ref:
        description: "Pin ref (commit SHA) của target"
        required: false
        type: string
        default: ""
    outputs:
      leak_found:
        description: "true nếu phát hiện ít nhất 1 secret"
        value: ${{ jobs.gitleaks.outputs.leak_found }}

permissions:
  contents: read
  security-events: write   # upload SARIF lên GitHub Security tab

jobs:
  gitleaks:
    name: "Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    timeout-minutes: 10   # scan history 2 repo ~2-3 phút

    outputs:
      leak_found: ${{ steps.set-output.outputs.leak_found }}

    steps:
      # fetch-depth: 0 → lấy toàn bộ git history
      # Nếu chỉ checkout shallow (depth=1), Gitleaks chỉ thấy commit mới nhất
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      # Checkout target app (full history) → scan secret trên code sẽ ship (Day 6b)
      # fetch-depth 0: cần full history để bắt secret đã commit rồi xóa
      - name: Checkout target app (full history)
        if: inputs.target_repo != ''
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          path: target
          fetch-depth: 0

      # Cài Gitleaks binary trực tiếp — không dùng action wrapper
      # → không cần GITLEAKS_LICENSE, kiểm soát version chính xác
      - name: Install Gitleaks v8.28.0
        run: |
          curl -sSL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      # ---- SCAN 1: Git History ----
      # Quét toàn bộ commit history — phát hiện secret đã commit rồi xóa
      # exit-code 1 = tìm thấy secret, 0 = sạch, khác = lỗi kỹ thuật
      - name: "Gitleaks: Scan git history"
        id: scan-git
        run: |
          set +e
          gitleaks git . \
            --config "${{ inputs.config_path }}" \
            --report-format sarif \
            --report-path gitleaks-git.sarif \
            --exit-code 1 \
            --verbose
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ $EXIT_CODE -eq 0 ]; then
            echo "git_status=clean" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "git_status=leaked" >> "$GITHUB_OUTPUT"
          else
            echo "git_status=error" >> "$GITHUB_OUTPUT"
            echo "::warning::Gitleaks git scan exited with code $EXIT_CODE (technical error, not leak detection)"
          fi

      # ---- SCAN 2: Working Tree (detect) ----
      # Quét file hiện tại — bắt secret trong file chưa được git track
      # if: always() → chạy kể cả khi scan 1 fail để có đủ report
      - name: "Gitleaks: Scan working tree"
        id: scan-detect
        if: always()
        run: |
          gitleaks detect . \
            --config "${{ inputs.config_path }}" \
            --report-format sarif \
            --report-path gitleaks-detect.sarif \
            --exit-code 1 \
            --verbose \
          && echo "detect_status=clean" >> "$GITHUB_OUTPUT" \
          || echo "detect_status=leaked" >> "$GITHUB_OUTPUT"

      # ---- SCAN 3: Target app repo (git history + working tree) — Day 6b ----
      # Chỉ chạy khi caller truyền target_repo. Scan cả history để bắt secret đã
      # commit vào target rồi xóa. exit-code không fail step ở đây (set +e) — kết
      # quả gộp vào set-output để fail-fast một chỗ.
      - name: "Gitleaks: Scan target app"
        id: scan-target
        if: always() && inputs.target_repo != ''
        run: |
          set +e
          gitleaks git ./target \
            --config "${{ inputs.config_path }}" \
            --report-format sarif \
            --report-path gitleaks-target-git.sarif \
            --exit-code 1 --verbose
          TARGET_GIT=$?
          gitleaks detect ./target \
            --config "${{ inputs.config_path }}" \
            --report-format sarif \
            --report-path gitleaks-target-detect.sarif \
            --exit-code 1 --verbose
          TARGET_DETECT=$?
          if [ $TARGET_GIT -eq 1 ] || [ $TARGET_DETECT -eq 1 ]; then
            echo "target_status=leaked" >> "$GITHUB_OUTPUT"
          else
            echo "target_status=clean" >> "$GITHUB_OUTPUT"
          fi

      # Tổng hợp kết quả — set output cho caller workflow
      - name: Set output
        id: set-output
        if: always()
        run: |
          GIT_STATUS="${{ steps.scan-git.outputs.git_status }}"
          DETECT_STATUS="${{ steps.scan-detect.outputs.detect_status }}"
          TARGET_STATUS="${{ steps.scan-target.outputs.target_status }}"
          echo "git_status=$GIT_STATUS | detect_status=$DETECT_STATUS | target_status=$TARGET_STATUS"
          if [[ "$GIT_STATUS" == "leaked" || "$DETECT_STATUS" == "leaked" || "$TARGET_STATUS" == "leaked" ]]; then
            echo "leak_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "leak_found=false" >> "$GITHUB_OUTPUT"
          fi

      # ---- Upload SARIF → GitHub Security tab ----
      # Yêu cầu: repo public HOẶC GitHub Advanced Security (paid plan)
      - name: Upload SARIF (git history scan)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8533807ff379ac610d2b2c389c47e7c629d31d13  # v4.36.3
        with:
          sarif_file: gitleaks-git.sarif
          category: gitleaks-git

      - name: Upload SARIF (working tree scan)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8533807ff379ac610d2b2c389c47e7c629d31d13  # v4.36.3
        with:
          sarif_file: gitleaks-detect.sarif
          category: gitleaks-detect

      - name: Upload SARIF (target app scan)
        if: always() && inputs.target_repo != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8533807ff379ac610d2b2c389c47e7c629d31d13  # v4.36.3
        with:
          sarif_file: gitleaks-target-git.sarif
          category: gitleaks-target

      # ---- Archive Reports ----
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: gitleaks-reports
          path: |
            gitleaks-git.sarif
            gitleaks-detect.sarif
            gitleaks-target-git.sarif
            gitleaks-target-detect.sarif
          retention-days: 30
          if-no-files-found: ignore

      # ---- Hard Fail nếu có secret ----
      # Tách bước fail ra cuối để đảm bảo report đã được upload trước
      - name: "Fail pipeline if secrets found"
        if: ${{ inputs.fail_on_leak && steps.set-output.outputs.leak_found == 'true' }}
        run: |
          echo "::error::Gitleaks detected secrets in this repository!"
          echo "::error::Check the 'gitleaks-reports' artifact for details."
          exit 1
