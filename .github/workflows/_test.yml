# =============================================================================
# Reusable Workflow: TEST
# Unit tests (pytest) + Smoke tests (container)
# =============================================================================

name: "_test"

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name"
        required: true
        type: string
      image_tag:
        description: "Image tag to pull for smoke test"
        required: true
        type: string
      target_repo:
        description: "Repo app cần test (owner/name) — checkout vào ./target"
        required: true
        type: string
      target_ref:
        description: "Pin ref (commit SHA) của target"
        required: true
        type: string
      python_version:
        description: "Python version for unit tests"
        required: false
        type: string
        default: "3.13"

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # pytest + smoke ~5 phút; buffer cho pip install nặng

    steps:
      # Checkout repo pipeline (smoke-test.sh nằm ở tests/ của repo này)
      - name: Checkout pipeline (smoke tests)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Checkout SOURCE của target app tại pin → unit test chạy trên code thật
      - name: Checkout target app source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          path: target

      # ---- Unit Tests ----
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ inputs.python_version }}

      # pip cache: tránh download lại packages mỗi run
      # hashFiles: cache invalidate khi requirements.txt của target thay đổi
      - name: Cache pip packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57  # v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('target/Backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install test dependencies
        run: |
          pip install -r target/Backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests + coverage gate
        run: |
          cd target/Backend
          python -m pytest ai_trend_agent.Tests/test_agents.py -v \
            --tb=short \
            --no-header \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=18
          # --cov=.               : đo coverage toàn bộ code trong Backend
          # --cov-report=term-missing : in ra DÒNG NÀO chưa được test
          # --cov-fail-under=18   : FLOOR chống tụt. Coverage thực đo được ~19.7%
          #   (2026-07-08). Đặt 18 để không false-fail do làm tròn, chỉ chặn REGRESSION.
          #   Nâng dần lên 30 → 50 → 70 khi target repo thêm test (RATCHET, chỉ tăng).

      # ---- Smoke Test (container) ----
      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: docker pull "$IMAGE_NAME:$IMAGE_TAG"

      - name: Run smoke tests
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          chmod +x tests/smoke-test.sh
          ./tests/smoke-test.sh "$IMAGE_NAME:$IMAGE_TAG"
