# =============================================================================
# Reusable Workflow: TEST
# Unit tests (pytest) + Smoke tests (container)
# =============================================================================

name: "_test"

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name"
        required: true
        type: string
      image_tag:
        description: "Image tag to pull for smoke test"
        required: true
        type: string
      target_repo:
        description: "Repo app cần test (owner/name) — checkout vào ./target"
        required: true
        type: string
      target_ref:
        description: "Pin ref (commit SHA) của target"
        required: true
        type: string
      python_version:
        description: "Python version for unit tests"
        required: false
        type: string
        default: "3.13"

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo pipeline (smoke-test.sh nằm ở tests/ của repo này)
      - name: Checkout pipeline (smoke tests)
        uses: actions/checkout@v4

      # Checkout SOURCE của target app tại pin → unit test chạy trên code thật
      - name: Checkout target app source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          path: target

      # ---- Unit Tests ----
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      # pip cache: tránh download lại packages mỗi run
      # hashFiles: cache invalidate khi requirements.txt của target thay đổi
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('target/Backend/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install test dependencies
        run: |
          pip install -r target/Backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: |
          cd target/Backend
          python -m pytest ai_trend_agent.Tests/test_agents.py -v \
            --tb=short \
            --no-header
          # --tb=short: traceback ngắn gọn, đủ debug
          # --no-header: bỏ header thừa

      # ---- Smoke Test (container) ----
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: docker pull "$IMAGE_NAME:$IMAGE_TAG"

      - name: Run smoke tests
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          chmod +x tests/smoke-test.sh
          ./tests/smoke-test.sh "$IMAGE_NAME:$IMAGE_TAG"
