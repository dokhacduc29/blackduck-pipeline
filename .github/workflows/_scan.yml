# =============================================================================
# Reusable Workflow: SCAN (Trivy)
# Quality gate + SARIF report + JSON artifact
# =============================================================================

name: "_scan"

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name"
        required: true
        type: string
      image_tag:
        description: "Image tag to scan"
        required: true
        type: string
      severity_gate:
        description: "Severity level that blocks pipeline"
        required: false
        type: string
        default: "CRITICAL"
      ignore_unfixed:
        description: "Skip CVEs without available fix"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # Trivy DB download + 3 lần scan image; timeout step riêng là 15m

    steps:
      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Quality Gate ----
      # exit-code: 1 → pipeline fail nếu tìm thấy CVE ở severity_gate
      # ignore-unfixed: true → chỉ block CVE đã có patch mà chưa apply
      # Trade-off: strict enough to catch real risks, lenient enough to not
      #   block on upstream issues we can't fix (VD: perl-base in Debian)
      - name: "Trivy: ${{ inputs.severity_gate }} CVE gate"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          image-ref: "${{ inputs.image_name }}:${{ inputs.image_tag }}"
          format: "table"
          severity: ${{ inputs.severity_gate }}
          exit-code: "1"
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          timeout: "15m"

      # ---- SARIF Report ----
      # Luôn chạy (if: always()) để có report kể cả khi gate fail
      # SARIF = Static Analysis Results Interchange Format
      # GitHub Security tab hiểu format này → hiện CVE trực tiếp trong UI
      - name: "Trivy: SARIF report"
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          image-ref: "${{ inputs.image_name }}:${{ inputs.image_tag }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          timeout: "15m"

      # Upload SARIF → GitHub Security tab
      # Yêu cầu: repo public HOẶC GitHub Advanced Security (paid plan)
      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8533807ff379ac610d2b2c389c47e7c629d31d13  # v4.36.3
        with:
          sarif_file: trivy-results.sarif

      # ---- JSON Report (archive) ----
      - name: "Trivy: JSON report"
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          image-ref: "${{ inputs.image_name }}:${{ inputs.image_tag }}"
          format: "json"
          output: "trivy-report.json"
          severity: "CRITICAL,HIGH,MEDIUM"
          timeout: "15m"

      # Upload artifacts — giữ 30 ngày cho audit trail
      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: trivy-reports
          path: |
            trivy-results.sarif
            trivy-report.json
          retention-days: 30
