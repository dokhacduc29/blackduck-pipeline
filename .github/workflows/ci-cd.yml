# =============================================================================
# CI/CD Pipeline — AI Trend Agent (Production-Grade)
# Day 11-16: Reusable Workflows + Multi-Environment + Approval Gate
#
# Flow:
#   SECRETS-SCAN (Gitleaks) ──┐
#   SAST (Semgrep)            ├→ BUILD → TEST ──┐
#                             │         SCAN ──┴→ DEPLOY-DEV (auto)
#                                                      ↓
#                                            DEPLOY-STAGING (auto, main only)
#                                                      ↓
#                                            DEPLOY-PROD (manual approval, main only)
#
# Reusable workflows (_build, _test, _scan, _deploy):
#   - Tách logic ra file riêng → tái sử dụng cho project khác
#   - Mỗi file tự khai báo permissions (least privilege)
#   - Main file chỉ orchestrate flow + truyền params
# =============================================================================

name: "AI Trend Agent CI/CD"

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip all deploy stages"
        type: boolean
        default: false
      environment:
        description: "Deploy to specific environment only"
        type: choice
        options:
          - "all"
          - "dev"
          - "staging"
          - "production"
        default: "all"

# Permissions: least-privilege
# Mỗi reusable workflow tự khai báo thêm nếu cần
permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ai-trend-agent

# Cancel pipeline cũ khi có push mới trên cùng branch
# Tránh race condition: 2 deploy cùng lúc → state không nhất quán
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # STAGE 0: CONFIG — single source of truth cho target repo + pin ref
  # `env` context KHÔNG dùng được trong `with:` của reusable workflow, nên pin
  # được publish qua job output rồi các stage sau đọc `needs.config.outputs.*`.
  # Bump pin = sửa DUY NHẤT ở đây (xem docs/ADR-002).
  # ===========================================================================
  config:
    runs-on: ubuntu-latest
    outputs:
      target_repo: ${{ steps.vars.outputs.target_repo }}
      target_ref: ${{ steps.vars.outputs.target_ref }}
    steps:
      - name: Resolve target repo + pin ref
        id: vars
        run: |
          echo "target_repo=dokhacduc29/Project_AI_trend_agent" >> "$GITHUB_OUTPUT"
          # Pin cứng commit SHA của target (main HEAD @ 2026-07-07) → scan/build
          # reproducible, không trôi khi app repo commit tiếp.
          echo "target_ref=95537f42bd4e387a64036270e4ed9bb666511107" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # STAGE 0a: SECRETS SCAN (Gitleaks) — chạy TRƯỚC BUILD
  # Fail-fast: nếu lộ secret → block toàn bộ pipeline ngay lập tức
  # Scan cả pipeline repo (self) VÀ target app repo tại pin (Day 6b)
  # ===========================================================================
  secrets-scan:
    needs: config
    uses: ./.github/workflows/_gitleaks.yml
    with:
      fail_on_leak: true
      target_repo: ${{ needs.config.outputs.target_repo }}
      target_ref: ${{ needs.config.outputs.target_ref }}

  # ===========================================================================
  # STAGE 0b: SAST (Semgrep) — chạy SONG SONG với Gitleaks
  # Scan source code tìm vulnerability TRƯỚC khi build image
  # Scan cả pipeline repo VÀ target app repo tại pin (Day 6b)
  # ===========================================================================
  sast:
    needs: config
    uses: ./.github/workflows/_sast.yml
    with:
      severity_gate: "ERROR"
      config: "auto"
      run_triage: false   # bật true + thêm ANTHROPIC_API_KEY secret để dùng LLM triage
      target_repo: ${{ needs.config.outputs.target_repo }}
      target_ref: ${{ needs.config.outputs.target_ref }}
    # Least privilege: pass ĐÚNG 1 secret _sast cần, không `inherit` toàn bộ secrets.
    # Nếu action Semgrep bị compromise, nó không thấy DISCORD/SUPABASE/REDDIT keys.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ===========================================================================
  # STAGE 1: BUILD — chỉ chạy khi CẢ HAI Stage 0 pass
  # ===========================================================================
  build:
    needs: [config, secrets-scan, sast]
    uses: ./.github/workflows/_build.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      # Build từ SOURCE của target app (checkout tại pin), KHÔNG dùng bản
      # vendored đã archive. Dockerfile hardening ở lại repo pipeline này.
      target_repo: ${{ needs.config.outputs.target_repo }}
      target_ref: ${{ needs.config.outputs.target_ref }}
    # permissions: reusable workflow inherits từ top-level caller
    # Không thể set per-job permissions khi dùng `uses:`

  # ===========================================================================
  # STAGE 2: TEST (chạy song song với SCAN)
  # needs: build → đợi image sẵn sàng
  # ===========================================================================
  test:
    needs: [config, build]
    uses: ./.github/workflows/_test.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      target_repo: ${{ needs.config.outputs.target_repo }}
      target_ref: ${{ needs.config.outputs.target_ref }}

  # ===========================================================================
  # STAGE 3: SCAN — chạy SONG SONG với TEST
  # Cả 2 chỉ cần image từ build → không cần đợi nhau
  # Trade-off: song song = nhanh hơn ~1 phút, nhưng tốn 2 runner slot
  # ===========================================================================
  scan:
    needs: build
    uses: ./.github/workflows/_scan.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      severity_gate: "CRITICAL"
      ignore_unfixed: true

  # ===========================================================================
  # STAGE 4a: DEPLOY → DEV
  # Auto deploy — không cần approval
  # Chạy trên mọi push (kể cả PR) để verify deploy logic
  # ===========================================================================
  deploy-dev:
    needs: [build, test, scan]
    if: |
      github.event.inputs.skip_deploy != 'true' &&
      (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev' || github.event.inputs.environment == '')
    uses: ./.github/workflows/_deploy.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      environment: dev
    secrets:
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Phase 6: Discord là publisher hiện hành (thay Telegram legacy)
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

  # ===========================================================================
  # STAGE 4b: DEPLOY → STAGING
  # Auto deploy — chỉ trên main branch, sau dev pass
  # Staging = bản sao production, dùng để final verification
  # ===========================================================================
  deploy-staging:
    needs: [build, deploy-dev]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_deploy != 'true' &&
      (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'staging' || github.event.inputs.environment == '')
    uses: ./.github/workflows/_deploy.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      environment: staging
    secrets:
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Phase 6: Discord là publisher hiện hành (thay Telegram legacy)
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

  # ===========================================================================
  # STAGE 4c: DEPLOY → PRODUCTION
  # MANUAL APPROVAL REQUIRED
  # Cần set trong GitHub → Settings → Environments → production:
  #   - Required reviewers: thêm reviewer (VD: mentor anh Bình)
  #   - Wait timer: optional (VD: 5 phút delay trước deploy)
  #   - Deployment branch: restrict to main only
  # Pipeline sẽ PAUSE ở đây chờ approval trong GitHub UI
  # ===========================================================================
  deploy-prod:
    needs: [build, deploy-staging]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_deploy != 'true' &&
      (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'production' || github.event.inputs.environment == '')
    uses: ./.github/workflows/_deploy.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      environment: production
    secrets:
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Phase 6: Discord là publisher hiện hành (thay Telegram legacy)
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
