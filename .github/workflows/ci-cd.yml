# =============================================================================
# CI/CD Pipeline — AI Trend Agent (Production-Grade)
# Day 11-16: Reusable Workflows + Multi-Environment + Approval Gate
#
# Flow:
#   BUILD → TEST ──┐
#                   ├→ DEPLOY-DEV (auto)
#          SCAN ──┘       ↓
#                   DEPLOY-STAGING (auto, main only)
#                         ↓
#                   DEPLOY-PROD (manual approval, main only)
#
# Reusable workflows (_build, _test, _scan, _deploy):
#   - Tách logic ra file riêng → tái sử dụng cho project khác
#   - Mỗi file tự khai báo permissions (least privilege)
#   - Main file chỉ orchestrate flow + truyền params
# =============================================================================

name: "AI Trend Agent CI/CD"

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip all deploy stages"
        type: boolean
        default: false
      environment:
        description: "Deploy to specific environment only"
        type: choice
        options:
          - "all"
          - "dev"
          - "staging"
          - "production"
        default: "all"

# Permissions: least-privilege
# Mỗi reusable workflow tự khai báo thêm nếu cần
permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ai-trend-agent

# Cancel pipeline cũ khi có push mới trên cùng branch
# Tránh race condition: 2 deploy cùng lúc → state không nhất quán
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # STAGE 1: BUILD
  # ===========================================================================
  build:
    uses: ./.github/workflows/_build.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
    # permissions: reusable workflow inherits từ top-level caller
    # Không thể set per-job permissions khi dùng `uses:`

  # ===========================================================================
  # STAGE 2: TEST (chạy song song với SCAN)
  # needs: build → đợi image sẵn sàng
  # ===========================================================================
  test:
    needs: build
    uses: ./.github/workflows/_test.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}

  # ===========================================================================
  # STAGE 3: SCAN — chạy SONG SONG với TEST
  # Cả 2 chỉ cần image từ build → không cần đợi nhau
  # Trade-off: song song = nhanh hơn ~1 phút, nhưng tốn 2 runner slot
  # ===========================================================================
  scan:
    needs: build
    uses: ./.github/workflows/_scan.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      severity_gate: "CRITICAL"
      ignore_unfixed: true

  # ===========================================================================
  # STAGE 4a: DEPLOY → DEV
  # Auto deploy — không cần approval
  # Chạy trên mọi push (kể cả PR) để verify deploy logic
  # ===========================================================================
  deploy-dev:
    needs: [build, test, scan]
    if: |
      github.event.inputs.skip_deploy != 'true' &&
      (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'dev' || github.event.inputs.environment == '')
    uses: ./.github/workflows/_deploy.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      environment: dev
    secrets:
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

  # ===========================================================================
  # STAGE 4b: DEPLOY → STAGING
  # Auto deploy — chỉ trên main branch, sau dev pass
  # Staging = bản sao production, dùng để final verification
  # ===========================================================================
  deploy-staging:
    needs: [build, deploy-dev]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_deploy != 'true' &&
      (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'staging' || github.event.inputs.environment == '')
    uses: ./.github/workflows/_deploy.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      environment: staging
    secrets:
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

  # ===========================================================================
  # STAGE 4c: DEPLOY → PRODUCTION
  # MANUAL APPROVAL REQUIRED
  # Cần set trong GitHub → Settings → Environments → production:
  #   - Required reviewers: thêm reviewer (VD: mentor anh Bình)
  #   - Wait timer: optional (VD: 5 phút delay trước deploy)
  #   - Deployment branch: restrict to main only
  # Pipeline sẽ PAUSE ở đây chờ approval trong GitHub UI
  # ===========================================================================
  deploy-prod:
    needs: [build, deploy-staging]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_deploy != 'true' &&
      (github.event.inputs.environment == 'all' || github.event.inputs.environment == 'production' || github.event.inputs.environment == '')
    uses: ./.github/workflows/_deploy.yml
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/ai-trend-agent
      image_tag: ${{ needs.build.outputs.image_tag }}
      environment: production
    secrets:
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
