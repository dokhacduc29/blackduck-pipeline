# =============================================================================
# Reusable Workflow: BUILD
# Tách riêng để tái sử dụng cho bất kỳ project nào cùng pattern
# Gọi bằng: uses: ./.github/workflows/_build.yml
# =============================================================================

name: "_build"

on:
  workflow_call:
    # ---- INPUTS: caller truyền vào ----
    inputs:
      image_name:
        description: "Full image name (VD: ghcr.io/user/app)"
        required: true
        type: string
      target_repo:
        description: "Repo app cần build (owner/name) — checkout vào ./target"
        required: true
        type: string
      target_ref:
        description: "Pin ref (commit SHA) của target — reproducible build"
        required: true
        type: string
      dockerfile:
        description: "Path tới Dockerfile (nằm trong repo pipeline, chứa hardening)"
        required: false
        type: string
        default: "./Dockerfile"
      context:
        description: "Docker build context — mặc định source target đã checkout"
        required: false
        type: string
        default: "./target"

    # ---- OUTPUTS: trả về cho caller ----
    outputs:
      image_tag:
        description: "Tag của image vừa build (commit SHA short)"
        value: ${{ jobs.build.outputs.image_tag }}
      image_digest:
        description: "Digest SHA256 — dùng để pin chính xác image"
        value: ${{ jobs.build.outputs.image_digest }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # build+push ~8 phút; quá 20 = treo → tự giết, không đốt quota
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      # Checkout repo pipeline (Dockerfile hardening + build config nằm ở đây)
      - name: Checkout pipeline (Dockerfile)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Checkout SOURCE của target app tại pin → build từ đây, không dùng bản
      # vendored. Tách concern: pipeline giữ Dockerfile, target giữ code.
      - name: Checkout target app source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          path: target

      # Buildx: multi-platform support + advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.7.1

      # Login dùng GITHUB_TOKEN — tự động rotate mỗi job, không cần PAT
      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action tự generate tags theo convention
      # sha: commit-based tag (traceability)
      # latest: chỉ trên default branch (main)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96  # v5.6.1
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Build + push với GHA cache (GitHub Actions cache backend)
      # cache-from/to: type=gha → dùng GitHub's built-in cache (~10GB free)
      # mode=max: cache mọi layer, không chỉ final stage
      - name: Build and push
        id: build-push
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355  # v6.10.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
