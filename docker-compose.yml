# docker-compose.yml — Deploy configuration
services:
  app:
    image: ${IMAGE_NAME:-ghcr.io/dokhacduc29/blackduck-unified}:${IMAGE_TAG:-latest}
    container_name: devsecops-demo
    ports:
      - "5000:5000"
    environment:
      - APP_VERSION=${IMAGE_TAG:-dev}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 3s
      retries: 3
