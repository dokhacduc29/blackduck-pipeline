# docker-compose.yml — AI Trend Agent deploy config
services:
  agent:
    image: ${IMAGE_NAME:-ghcr.io/dokhacduc29/ai-trend-agent}:${IMAGE_TAG:-latest}
    container_name: ai-trend-agent
    environment:
      # Secrets inject từ CI/CD hoặc .env file (đã gitignore)
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TOPIC=${TOPIC:-Artificial Intelligence}
    volumes:
      - agent-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: on-failure:3

volumes:
  agent-data:
    driver: local
