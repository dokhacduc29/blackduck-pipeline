# =============================================================================
# Gitleaks Configuration вЂ” AI Trend Agent
# Docs: https://github.com/gitleaks/gitleaks#configuration
# =============================================================================
#
# BUILT-IN RULES (useDefault = true) tб»± Д‘б»™ng detect:
#   - AWS keys (AKIA..., aws_secret_access_key)
#   - GitHub tokens (ghp_, gho_, ghu_, ghs_)
#   - Google API keys (AIza...)
#   - Stripe keys (sk_live_, pk_live_)
#   - Slack tokens (xox...)
#   - JWT tokens
#   - RSA/EC/PGP private keys
#   - Telegram Bot tokens (123456:AA...)
#   - Supabase service role keys (eyJ...)
#   - NPM / PyPI tokens
#   - Twilio / SendGrid / Mailchimp keys
#   - Generic password/secret assignments
# =============================================================================

title = "Gitleaks Config - AI Trend Agent"

# Kбєї thб»«a toГ n bб»™ ~150 built-in rules
[extend]
useDefault = true

# =============================================================================
# CUSTOM RULES вЂ” bб»• sung cho built-in
# ThГЄm khi phГЎt hiб»‡n pattern chЖ°a cГі trong default
# =============================================================================

[[rules]]
id = "supabase-anon-key"
description = "Supabase anon/service_role JWT key"
# eyJ = base64 cб»§a {"alg":... вЂ” lГ  JWT header cб»§a Supabase
regex = '''eyJ[a-zA-Z0-9_-]{20,}\.[a-zA-Z0-9_-]{20,}\.[a-zA-Z0-9_-]{20,}'''
tags = ["supabase", "jwt", "secret"]
# Chб»‰ flag khi Д‘б»©ng gбє§n keyword supabase/SUPABASE
keywords = ["supabase", "SUPABASE", "sb-"]

[[rules]]
id = "newsapi-key"
description = "NewsAPI key (32-char hex)"
regex = '''(?i)(news.?api.?key|newsapi)[^\w]([a-f0-9]{32})'''
tags = ["newsapi", "secret"]

[[rules]]
id = "generic-env-assignment"
description = "Hardcoded secret string literal in assignment (KEY='actual_value')"
# Chб»‰ bбєЇt khi giГЎ trб»‹ lГ  STRING LITERAL (trong nhГЎy Д‘ЖЎn/Д‘Гґi)
# TrГЎnh bбєЇt nhбє§m keyword argument: func(api_key=variable)
regex = '''(?i)(api_key|secret|password|token|credential)\s*=\s*["'][^"']{8,}["']'''
tags = ["generic", "secret"]
[rules.allowlist]
regexes = [
  '''your_.*_here''',
  '''<[^>]+>''',
  '''example''',
  '''xxx+''',
  '''changeme''',
  '''placeholder''',
  '''dummy''',
  '''test''',
]

# =============================================================================
# GLOBAL ALLOWLIST вЂ” file/path/commit khГґng cбє§n scan
# =============================================================================

[allowlist]
description = "Allowlist toГ n cб»Ґc"

# Files chб»©a placeholder вЂ” khГґng phбєЈi secret thбє­t
paths = [
  '''^\.env\.example$''',
  '''^\.env\.sample$''',
  '''^\.env\.template$''',
  '''^docs/.*''',
  '''^tests/.*''',
  '''^Backend/ai_trend_agent\.Tests/.*''',
  '''.*\.md$''',
  '''SECURITY\.md''',
  # File mock dГ№ng Д‘б»ѓ test Gitleaks pre-commit hook (Day 18)
  '''^test_fake_secret\.py$''',
]

# Regex pattern rГµ lГ  placeholder
regexes = [
  '''your_[a-z_]+_here''',
  '''xxxx+''',
  '''<YOUR[_A-Z]+>''',
  '''changeme''',
  # GitHub Actions expression вЂ” khГґng phбєЈi secret thбє­t
  '''\$\{\{[^}]+\}\}''',
]

# Commit Д‘Ж°б»Јc bб»Џ qua (VD: commit khб»џi tбєЎo repo vб»›i boilerplate)
# commits = ["abc1234"]
